name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push metrics service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/metrics/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/devops-metrics:latest

      - name: Build and push ML service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/ml/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/devops-ml:latest

      - name: Build and push API service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/api/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/devops-api:latest

      - name: Build and push alerting service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/alerting/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/devops-alerting:latest

      - name: Deployment summary
        run: |
          echo "All images pushed to Docker Hub successfully"
          echo "Images: devops-metrics, devops-ml, devops-api, devops-alerting"
